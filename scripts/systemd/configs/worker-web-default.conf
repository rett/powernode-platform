# Powernode Worker Web UI Instance Configuration
# Instance: default
# Installed to /etc/powernode/worker-web-default.conf

# Sidekiq Web UI binding
# Default binds to localhost only for security
SIDEKIQ_WEB_HOST=0.0.0.0
SIDEKIQ_WEB_PORT=4567

# Redis (must match the worker instance it's bound to)
REDIS_URL=redis://localhost:6379/1

# Worker environment
WORKER_ENV=development

# Backend API URL
BACKEND_API_URL=http://localhost:3000

# Worker auth token
WORKER_TOKEN=your_worker_token_here
