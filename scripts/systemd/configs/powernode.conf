# Powernode Global Configuration
# Shared by all service instances.
# Installed to /etc/powernode/powernode.conf

# Base path where Powernode is installed
POWERNODE_BASE=/opt/powernode

# Operating mode: "development" or "production"
# Controls frontend service availability (ConditionEnvironment)
POWERNODE_MODE=development

# RVM configuration
# Auto-detected during install; override if needed
RVM_PATH=/usr/local/rvm
POWERNODE_RUBY_VERSION=ruby-3.3.0

# Container registry for sandbox/agent images
# Used by SandboxManagerService.resolve_trust_level_image
POWERNODE_REGISTRY_URL=git.ipnode.net/powernode

# nvm configuration
# Auto-detected during install; override if needed
NVM_DIR=$HOME/.nvm
NODE_VERSION=22
