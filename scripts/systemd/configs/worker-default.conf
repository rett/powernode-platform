# Powernode Worker Instance Configuration
# Instance: default
# Installed to /etc/powernode/worker-default.conf

# Worker environment (maps to RAILS_ENV internally)
WORKER_ENV=development

# Redis (Sidekiq queue + job data)
REDIS_URL=redis://localhost:6379/1

# Concurrency (number of Sidekiq threads)
# 25 threads handles trading + AI + devops jobs concurrently
WORKER_CONCURRENCY=25

# Worker identity (UUID of this worker's database record)
# Find via: cd server && rails runner "puts Worker.system_worker.id"
WORKER_ID=your_worker_id_here

# Primary service URL (how worker reaches the backend API)
PRIMARY_SERVICE_URL=http://localhost:3000
BACKEND_API_URL=http://localhost:3000

# JWT secret (must match server's JWT_SECRET_KEY for bi-directional auth)
# Generate: openssl rand -hex 32
JWT_SECRET_KEY=your_jwt_secret_here

# Job timeout (seconds)
# WORKER_TIMEOUT=300
