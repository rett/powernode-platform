# Powernode Worker Instance Configuration
# Instance: default
# Installed to /etc/powernode/worker-default.conf

# Worker environment (maps to RAILS_ENV internally)
WORKER_ENV=development

# Redis
REDIS_URL=redis://localhost:6379/1

# Concurrency (number of Sidekiq threads)
WORKER_CONCURRENCY=5

# Service authentication token (must match backend WORKER_SERVICE_TOKEN)
WORKER_TOKEN=your_worker_token_here

# Primary service URL (how worker reaches the backend API)
PRIMARY_SERVICE_URL=http://localhost:3000
BACKEND_API_URL=http://localhost:3000

# Job timeout (seconds)
# WORKER_TIMEOUT=300
