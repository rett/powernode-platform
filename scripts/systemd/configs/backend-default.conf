# Powernode Backend Instance Configuration
# Instance: default
# Installed to /etc/powernode/backend-default.conf

# Server binding
PORT=3000
HOST=0.0.0.0

# Rails environment
RAILS_ENV=development

# Database (uses Rails database.yml by default; override here if needed)
# DATABASE_URL=postgres://powernode:password@localhost:5432/powernode_development

# Redis
REDIS_URL=redis://localhost:6379/0

# JWT secret (generate with: openssl rand -hex 64)
# JWT_SECRET=

# Service tokens for inter-service authentication
# WORKER_SERVICE_TOKEN=
# INTERNAL_API_TOKEN=

# Puma configuration
# RAILS_MAX_THREADS=3
# WEB_CONCURRENCY=2

# Logging
RAILS_LOG_TO_STDOUT=true
