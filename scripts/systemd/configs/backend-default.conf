# Powernode Backend Instance Configuration
# Instance: default
# Installed to /etc/powernode/backend-default.conf

# Server binding
PORT=3000
HOST=0.0.0.0

# Rails environment
RAILS_ENV=development

# Database (uses Rails database.yml by default; override here if needed)
# DATABASE_URL=postgres://powernode:password@localhost:5432/powernode_development

# Redis (cache + session store)
REDIS_URL=redis://localhost:6379/0

# ActionCable uses a separate Redis DB to avoid Sidekiq contention
ACTION_CABLE_REDIS_URL=redis://localhost:6379/2

# JWT secret (generate with: openssl rand -hex 64)
# JWT_SECRET=

# Service tokens for inter-service authentication
# WORKER_SERVICE_TOKEN=
# INTERNAL_API_TOKEN=

# Puma configuration
# Threads per worker process (each thread handles one concurrent request)
# Increase for parallel training sessions (4 sessions × 12 strategies × 2-3 API calls)
RAILS_MAX_THREADS=128
# Worker processes (forks) — multiplies throughput, bypasses GVL
WEB_CONCURRENCY=4
# DB pool = threads + headroom for ActionCable/background threads
DB_POOL=140

# Logging
RAILS_LOG_TO_STDOUT=true
