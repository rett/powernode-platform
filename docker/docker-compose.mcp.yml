# Docker Compose override for MCP server containers
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.mcp.yml up
#
# Each MCP server runs in a sandboxed container with:
# - Read-only root filesystem
# - All capabilities dropped
# - No privilege escalation
# - Memory and CPU limits
# - Internal network only (no host port exposure)
#
# Credentials: Copy .env.mcp.example to .env.mcp and fill in your API keys

services:
  # Slack MCP Server
  mcp-slack:
    image: node:20-slim
    container_name: powernode-mcp-slack
    command: ["npx", "-y", "@anthropic/mcp-server-slack"]
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_TEAM_ID=${SLACK_TEAM_ID}
      - NODE_ENV=production
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    tmpfs:
      - /tmp
      - /root/.npm:exec
    networks:
      - powernode-mcp
    profiles:
      - mcp

