# Grafana dashboard provisioning configuration
apiVersion: 1

providers:
  # Dashboard provider for Powernode dashboards
  - name: 'powernode-dashboards'
    orgId: 1
    folder: 'Powernode'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards

  # System dashboards
  - name: 'system-dashboards'
    orgId: 1
    folder: 'System'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards/system