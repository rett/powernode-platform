# Docker Compose for local development
# Usage: docker-compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: powernode-postgres
    environment:
      POSTGRES_USER: powernode
      POSTGRES_PASSWORD: powernode_dev
      POSTGRES_DB: powernode_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powernode"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Sidekiq and caching
  redis:
    image: redis:7-alpine
    container_name: powernode-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Rails API Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: powernode-backend
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://powernode:powernode_dev@postgres:5432/powernode_development
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: dev_secret_key_base_for_local_development_only
      JWT_SECRET: dev_jwt_secret_for_local_development_only
      WORKER_API_KEY: dev_worker_api_key
    volumes:
      - ./server:/app
      - backend_gems:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  # Sidekiq Worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile.dev
    container_name: powernode-worker
    environment:
      REDIS_URL: redis://redis:6379/0
      BACKEND_API_URL: http://backend:3000
      WORKER_API_KEY: dev_worker_api_key
    volumes:
      - ./worker:/app
      - worker_gems:/usr/local/bundle
    depends_on:
      - backend
      - redis

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: powernode-frontend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_gems:
  worker_gems:
