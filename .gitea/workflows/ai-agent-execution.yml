# AI Agent Execution Workflow
# Powernode AI Agent Community Platform
#
# This workflow executes AI agents in sandboxed containers with
# secure secret injection from HashiCorp Vault.
#
# Triggered via workflow_dispatch from ContainerOrchestrationService

name: AI Agent Execution

on:
  workflow_dispatch:
    inputs:
      execution_id:
        description: 'Unique execution ID for tracking'
        required: true
        type: string
      container_image:
        description: 'Container image to run'
        required: true
        type: string
      account_id:
        description: 'Account ID for secret scoping'
        required: true
        type: string
      vault_token:
        description: 'Short-lived Vault token for secret access'
        required: true
        type: string
      input_parameters:
        description: 'JSON-encoded input parameters'
        required: false
        type: string
        default: '{}'
      timeout_minutes:
        description: 'Execution timeout in minutes'
        required: false
        type: number
        default: 60
      callback_url:
        description: 'URL to POST results'
        required: true
        type: string

env:
  EXECUTION_ID: ${{ inputs.execution_id }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}

jobs:
  validate:
    runs-on: [powernode-ai-agent]
    outputs:
      image_allowed: ${{ steps.validate.outputs.allowed }}
    steps:
      - name: Validate Container Image
        id: validate
        run: |
          # Validate image is from allowed registry
          ALLOWED_REGISTRIES="powernode/ ghcr.io/powernode/"
          IMAGE="${{ inputs.container_image }}"

          ALLOWED="false"
          for registry in $ALLOWED_REGISTRIES; do
            if [[ "$IMAGE" == ${registry}* ]]; then
              ALLOWED="true"
              break
            fi
          done

          echo "allowed=$ALLOWED" >> $GITHUB_OUTPUT

          if [ "$ALLOWED" != "true" ]; then
            echo "::error::Container image not from allowed registry: $IMAGE"
            exit 1
          fi

  execute:
    needs: validate
    if: needs.validate.outputs.image_allowed == 'true'
    runs-on: [powernode-ai-agent]
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}

    container:
      image: ${{ inputs.container_image }}
      options: >-
        --read-only
        --cap-drop=ALL
        --security-opt=no-new-privileges:true
        --memory=512m
        --cpus=0.5
        --network=powernode-agent-network

    steps:
      - name: Inject Secrets from Vault
        id: secrets
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ inputs.vault_token }}
          caCertificate: ${{ secrets.VAULT_CA_CERT }}
          secrets: |
            secret/data/powernode/accounts/${{ inputs.account_id }}/ai-providers/openai api_key | OPENAI_API_KEY ;
            secret/data/powernode/accounts/${{ inputs.account_id }}/ai-providers/anthropic api_key | ANTHROPIC_API_KEY ;
            secret/data/powernode/containers/${{ inputs.execution_id }}/config * | AGENT_CONFIG

      - name: Prepare Execution Context
        run: |
          # Create temp directory for execution
          mkdir -p /tmp/agent-work

          # Write input parameters
          echo '${{ inputs.input_parameters }}' > /tmp/agent-work/input.json

          # Set execution metadata
          echo "EXECUTION_ID=${{ inputs.execution_id }}" >> $GITHUB_ENV
          echo "ACCOUNT_ID=${{ inputs.account_id }}" >> $GITHUB_ENV

      - name: Execute Agent
        id: execute
        run: |
          # Run the agent entrypoint
          /entrypoint.sh \
            --execution-id "${{ inputs.execution_id }}" \
            --input-file /tmp/agent-work/input.json \
            --output-file /tmp/agent-work/output.json
        env:
          OPENAI_API_KEY: ${{ steps.secrets.outputs.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ steps.secrets.outputs.ANTHROPIC_API_KEY }}

      - name: Capture Output
        if: always()
        id: output
        run: |
          if [ -f /tmp/agent-work/output.json ]; then
            # Encode output for safe transmission
            OUTPUT=$(cat /tmp/agent-work/output.json | base64 -w 0)
            echo "output=$OUTPUT" >> $GITHUB_OUTPUT
          else
            echo "output=" >> $GITHUB_OUTPUT
          fi

      - name: Report Results
        if: always()
        run: |
          STATUS="${{ job.status }}"
          OUTPUT="${{ steps.output.outputs.output }}"

          # Build result payload
          PAYLOAD=$(cat <<EOF
          {
            "execution_id": "${{ inputs.execution_id }}",
            "status": "$STATUS",
            "output": "$OUTPUT",
            "completed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runner": "${{ runner.name }}"
          }
          EOF
          )

          # Report to callback URL
          curl -X POST "${{ inputs.callback_url }}" \
            -H "Authorization: Bearer ${{ secrets.WORKER_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --retry 3 \
            --retry-delay 5 \
            --max-time 30

  cleanup:
    needs: execute
    if: always()
    runs-on: [powernode-ai-agent]
    steps:
      - name: Cleanup Secrets
        run: |
          # Vault token is automatically revoked after TTL
          # This step can perform additional cleanup if needed
          echo "Execution ${{ inputs.execution_id }} cleanup complete"
