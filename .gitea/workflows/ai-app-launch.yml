name: AI Mission App Launch

on:
  workflow_dispatch:
    inputs:
      mission_id:
        description: 'Mission ID'
        required: true
      branch:
        description: 'Branch to deploy'
        required: true
      port:
        description: 'Port to expose'
        required: true
      callback_url:
        description: 'URL to POST deployment status'
        required: true
      app_type:
        description: 'Application type (node, python, ruby, static)'
        required: false
        default: 'auto'

jobs:
  launch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Detect app type
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
            echo "internal_port=3000" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "Pipfile" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
            echo "internal_port=8000" >> $GITHUB_OUTPUT
          elif [ -f "Gemfile" ]; then
            echo "type=ruby" >> $GITHUB_OUTPUT
            echo "internal_port=3000" >> $GITHUB_OUTPUT
          elif [ -f "index.html" ]; then
            echo "type=static" >> $GITHUB_OUTPUT
            echo "internal_port=80" >> $GITHUB_OUTPUT
          else
            echo "type=node" >> $GITHUB_OUTPUT
            echo "internal_port=3000" >> $GITHUB_OUTPUT
          fi

      - name: Generate Dockerfile
        if: "!hashFiles('Dockerfile')"
        run: |
          APP_TYPE="${{ inputs.app_type }}"
          if [ "$APP_TYPE" = "auto" ]; then
            APP_TYPE="${{ steps.detect.outputs.type }}"
          fi

          case $APP_TYPE in
            node)
              cat > Dockerfile <<'DOCKERFILE'
          FROM node:20-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci --production
          COPY . .
          RUN npm run build 2>/dev/null || true
          EXPOSE 3000
          CMD ["npm", "start"]
          DOCKERFILE
              ;;
            python)
              cat > Dockerfile <<'DOCKERFILE'
          FROM python:3.12-slim
          WORKDIR /app
          COPY requirements.txt ./
          RUN pip install --no-cache-dir -r requirements.txt
          COPY . .
          EXPOSE 8000
          CMD ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          DOCKERFILE
              ;;
            static)
              cat > Dockerfile <<'DOCKERFILE'
          FROM nginx:alpine
          COPY . /usr/share/nginx/html
          EXPOSE 80
          DOCKERFILE
              ;;
          esac

      - name: Build Docker image
        run: |
          docker build -t cf-mission-${{ inputs.mission_id }} .

      - name: Run container
        id: container
        run: |
          INTERNAL_PORT="${{ steps.detect.outputs.internal_port }}"
          CONTAINER_ID=$(docker run -d \
            -p ${{ inputs.port }}:${INTERNAL_PORT} \
            --name mission-${{ inputs.mission_id }} \
            --memory=256m \
            --cpus=0.5 \
            --restart=unless-stopped \
            cf-mission-${{ inputs.mission_id }})
          echo "container_id=${CONTAINER_ID}" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ inputs.port }} | grep -qE "^[23]"; then
              echo "App is healthy on port ${{ inputs.port }}"
              exit 0
            fi
            echo "Waiting for app... ($i/60)"
            sleep 1
          done
          echo "Health check timed out"
          exit 1

      - name: Report deployment
        if: always()
        run: |
          HOSTNAME=$(hostname -f 2>/dev/null || hostname)
          STATUS="${{ job.status }}"
          curl -s -X POST "${{ inputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"mission_id\": \"${{ inputs.mission_id }}\",
              \"container_id\": \"${{ steps.container.outputs.container_id }}\",
              \"url\": \"http://${HOSTNAME}:${{ inputs.port }}\",
              \"status\": \"${STATUS}\",
              \"port\": ${{ inputs.port }}
            }"
