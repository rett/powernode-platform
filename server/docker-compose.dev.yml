version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: powernode_development
      POSTGRES_USER: powernode
      POSTGRES_PASSWORD: development_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powernode"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://powernode:development_password@db:5432/powernode_development
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: development_jwt_secret_key_32_characters_long
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    command: ["bundle", "exec", "rails", "server", "-b", "0.0.0.0", "-p", "3000"]
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    environment:
      REACT_APP_API_URL: http://localhost:3000
      REACT_APP_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ../frontend:/app
      - node_modules:/app/node_modules
    command: ["npm", "start"]
    stdin_open: true
    tty: true

volumes:
  postgres_dev_data:
  redis_dev_data:
  bundle_cache:
  node_modules: