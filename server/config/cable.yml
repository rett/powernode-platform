development:
  adapter: redis
  url: <%= ENV.fetch("ACTION_CABLE_REDIS_URL", "redis://localhost:6379/2") %>
  channel_prefix: powernode_cable

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
