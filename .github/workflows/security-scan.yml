name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  DOCKER_BUILDKIT: 1

jobs:
  # Code security scanning
  code-security:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: javascript, ruby
        queries: security-extended,security-and-quality

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.0'
        bundler-cache: true
        working-directory: ./server

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # Dependency vulnerability scanning
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        component: [server, frontend, worker]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Scan Ruby dependencies (server/worker)
      if: matrix.component == 'server' || matrix.component == 'worker'
      working-directory: ./${{ matrix.component }}
      run: |
        gem install bundler-audit
        bundle audit --update

    - name: Scan Node.js dependencies (frontend)
      if: matrix.component == 'frontend'
      working-directory: ./frontend
      run: |
        npm audit --audit-level=moderate
        npx audit-ci --moderate

    - name: Upload dependency scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-scan-${{ matrix.component }}
        path: |
          ${{ matrix.component }}/audit-results.json
          ${{ matrix.component }}/bundler-audit.txt

  # Docker image security scanning
  docker-security:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    strategy:
      matrix:
        service: [backend, frontend, worker]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./${{ matrix.service == 'backend' && 'server' || matrix.service }}
        load: true
        tags: powernode-${{ matrix.service }}:security-scan
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'powernode-${{ matrix.service }}:security-scan'
        format: 'sarif'
        output: 'trivy-results-${{ matrix.service }}.sarif'

    - name: Run Snyk container scan
      uses: snyk/actions/docker@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        image: 'powernode-${{ matrix.service }}:security-scan'
        args: --severity-threshold=high --file=./${{ matrix.service == 'backend' && 'server' || matrix.service }}/Dockerfile

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results-${{ matrix.service }}.sarif'

    - name: Upload scan artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-scan-${{ matrix.service }}
        path: |
          trivy-results-${{ matrix.service }}.sarif
          snyk-results-${{ matrix.service }}.json

  # Infrastructure security scanning
  infrastructure-security:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Scan Docker Compose files
      run: |
        docker run --rm -v "$(pwd):/project" \
          bridgecrew/checkov -d /project/docker --framework docker-compose \
          --output cli --output json --output-file-path /project/checkov-results.json

    - name: Scan Kubernetes manifests
      if: hashFiles('k8s/**/*.yaml') != ''
      run: |
        docker run --rm -v "$(pwd):/project" \
          bridgecrew/checkov -d /project/k8s --framework kubernetes \
          --output cli --output json --output-file-path /project/k8s-checkov-results.json

    - name: Scan Terraform files
      if: hashFiles('terraform/**/*.tf') != ''
      run: |
        docker run --rm -v "$(pwd):/project" \
          bridgecrew/checkov -d /project/terraform --framework terraform \
          --output cli --output json --output-file-path /project/terraform-checkov-results.json

    - name: Upload infrastructure scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: infrastructure-security-scan
        path: |
          checkov-results.json
          k8s-checkov-results.json
          terraform-checkov-results.json

  # Secret scanning
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

    - name: GitLeaks scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Compliance checks
  compliance-check:
    name: Compliance Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: CIS Docker Benchmark
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          -v /usr/local/bin/docker:/usr/local/bin/docker \
          -v /usr/lib/systemd:/usr/lib/systemd \
          docker/docker-bench-security

    - name: OWASP ZAP API Security Test
      if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
      uses: zaproxy/action-api-scan@v0.4.0
      with:
        target: 'https://staging.powernode.io/api/v1'
        format: openapi
        cmd_options: '-a'

    - name: Upload OWASP ZAP report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: owasp-zap-report
        path: report_html.html

  # Security report consolidation
  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [code-security, dependency-scan, docker-security, infrastructure-security, secret-scan, compliance-check]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" > security-summary.md
        echo "## Scan Results" >> security-summary.md
        echo "- Code Security: ${{ needs.code-security.result }}" >> security-summary.md
        echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> security-summary.md
        echo "- Docker Security: ${{ needs.docker-security.result }}" >> security-summary.md
        echo "- Infrastructure Security: ${{ needs.infrastructure-security.result }}" >> security-summary.md
        echo "- Secret Detection: ${{ needs.secret-scan.result }}" >> security-summary.md
        echo "- Compliance Check: ${{ needs.compliance-check.result }}" >> security-summary.md
        echo "" >> security-summary.md
        echo "## Artifacts Generated" >> security-summary.md
        find . -name "*.sarif" -o -name "*.json" -o -name "*.html" | sed 's/^/- /' >> security-summary.md

    - name: Upload security summary
      uses: actions/upload-artifact@v4
      with:
        name: security-summary
        path: security-summary.md

    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('security-summary.md', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });

  # Notify on security issues
  security-notification:
    name: Security Issue Notification
    runs-on: ubuntu-latest
    needs: [code-security, dependency-scan, docker-security, infrastructure-security, secret-scan, compliance-check]
    if: failure()
    
    steps:
    - name: Notify security team
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: failure
        channel: '#security-alerts'
        text: |
          🚨 Security scan failed for Powernode Platform
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Workflow: ${{ github.workflow }}
          
          Please review the security scan results and take appropriate action.
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SECURITY_SLACK_WEBHOOK_URL }}