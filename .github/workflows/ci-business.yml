# Business CI Workflow
# Runs full test suite with business submodule checked out.
# This workflow is triggered from the private powernode-business repo
# or manually via workflow_dispatch.

name: CI (Business)

on:
  workflow_dispatch:
    inputs:
      business_ref:
        description: 'Business branch/tag to test'
        required: false
        default: 'develop'

env:
  RUBY_VERSION: "3.2.8"
  NODE_VERSION: "20"
  POSTGRES_USER: powernode
  POSTGRES_PASSWORD: powernode_test
  POSTGRES_DB: powernode_test

jobs:
  backend-tests:
    name: Backend Tests (Business)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code with business submodule
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ENTERPRISE_PAT }}

      - name: Checkout business branch
        if: github.event.inputs.business_ref
        run: |
          cd business
          git checkout ${{ github.event.inputs.business_ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: server

      - name: Set up database
        working-directory: server
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          REDIS_URL: redis://localhost:6379/0
        run: |
          bundle exec rails db:create
          bundle exec rails db:migrate

      - name: Verify business engine loaded
        working-directory: server
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY_BASE: test_secret_key_base
        run: |
          bundle exec rails runner "raise 'Business not loaded' unless defined?(PowernodeBusiness::Engine)"

      - name: Run RSpec tests (core + business)
        working-directory: server
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY_BASE: test_secret_key_base
          JWT_SECRET: test_jwt_secret
        run: bundle exec rspec --format progress

  frontend-tests:
    name: Frontend Tests (Business)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with business submodule
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ENTERPRISE_PAT }}

      - name: Checkout business branch
        if: github.event.inputs.business_ref
        run: |
          cd business
          git checkout ${{ github.event.inputs.business_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript check (with business)
        working-directory: frontend
        run: npm run typecheck

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run Jest tests
        working-directory: frontend
        env:
          CI: true
        run: npm test -- --coverage --watchAll=false

  build-business-images:
    name: Build Business Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code with business submodule
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ENTERPRISE_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (business)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./server/Dockerfile
          push: false
          tags: powernode-backend-business:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (business)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: powernode-frontend-business:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://api.example.com
            VITE_WS_URL=wss://api.example.com
