# Deployment Rollback Workflow
# Allows manual rollback to a previous deployment

name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - staging
          - production
      target_version:
        description: "Git SHA or tag to rollback to (leave empty for previous)"
        required: false
        type: string
      include_database:
        description: "Rollback database migrations (DANGEROUS)"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Confirm rollback
  confirm:
    name: Confirm Rollback
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.approval.outputs.approved }}
    steps:
      - name: Request approval
        id: approval
        run: |
          echo "::warning::Rolling back ${{ github.event.inputs.environment }} to ${{ github.event.inputs.target_version || 'previous version' }}"
          echo "approved=true" >> $GITHUB_OUTPUT

  # Get rollback target
  prepare:
    name: Prepare Rollback
    runs-on: ubuntu-latest
    needs: confirm
    outputs:
      target_sha: ${{ steps.get-target.outputs.sha }}
      current_sha: ${{ steps.get-current.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current deployment SHA
        id: get-current
        run: |
          # In a real scenario, this would query your deployment tracking system
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Get target SHA
        id: get-target
        run: |
          if [ -n "${{ github.event.inputs.target_version }}" ]; then
            # Use specified version
            TARGET="${{ github.event.inputs.target_version }}"
          else
            # Get previous deployment (second most recent tag)
            TARGET=$(git tag --sort=-creatordate | head -n 2 | tail -n 1)
            if [ -z "$TARGET" ]; then
              # Fallback to previous commit
              TARGET=$(git rev-parse HEAD~1)
            fi
          fi
          echo "Rollback target: $TARGET"
          echo "sha=$TARGET" >> $GITHUB_OUTPUT

  # Create database backup before rollback
  backup:
    name: Backup Database
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event.inputs.include_database == 'true'
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Create pre-rollback backup
        run: |
          echo "Creating database backup before rollback..."
          # SSH to server and run backup
          # This would use the backup script created earlier

  # Perform rollback
  rollback:
    name: Rollback to ${{ needs.prepare.outputs.target_sha }}
    runs-on: ubuntu-latest
    needs: [prepare, backup]
    if: always() && needs.prepare.result == 'success' && (needs.backup.result == 'success' || needs.backup.result == 'skipped')
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Checkout target version
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if target images exist
        id: check-images
        run: |
          TARGET_SHA="${{ needs.prepare.outputs.target_sha }}"
          SHORT_SHA="${TARGET_SHA:0:7}"
          
          # Check if images exist for target SHA
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:sha-${SHORT_SHA} > /dev/null 2>&1; then
            echo "images_exist=true" >> $GITHUB_OUTPUT
            echo "image_tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "images_exist=false" >> $GITHUB_OUTPUT
            echo "::error::No images found for SHA ${TARGET_SHA}"
          fi

      - name: Rollback deployment
        if: steps.check-images.outputs.images_exist == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          IMAGE_TAG: ${{ steps.check-images.outputs.image_tag }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << ROLLBACK_SCRIPT
            cd ~/powernode
            
            # Update image tags in environment
            export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${IMAGE_TAG}
            export WORKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${IMAGE_TAG}
            export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${IMAGE_TAG}
            
            # Pull rollback images
            docker pull \$BACKEND_IMAGE
            docker pull \$WORKER_IMAGE
            docker pull \$FRONTEND_IMAGE
            
            # Update compose file with new image tags
            sed -i "s|image: .*backend:.*|image: \$BACKEND_IMAGE|g" docker-compose.prod.yml
            sed -i "s|image: .*worker:.*|image: \$WORKER_IMAGE|g" docker-compose.prod.yml
            sed -i "s|image: .*frontend:.*|image: \$FRONTEND_IMAGE|g" docker-compose.prod.yml
            
            # Deploy rollback version
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            echo "Rollback deployment completed"
          ROLLBACK_SCRIPT

      - name: Rollback database migrations
        if: github.event.inputs.include_database == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "::warning::Database migration rollback requested"
          ssh $DEPLOY_USER@$DEPLOY_HOST << 'DB_ROLLBACK'
            cd ~/powernode
            
            # Get the migration version from the target deployment
            # This is dangerous and should be carefully reviewed
            docker compose -f docker-compose.prod.yml exec -T backend \
              bundle exec rails db:rollback STEP=1
            
            echo "Database rollback completed (1 migration)"
          DB_ROLLBACK

      - name: Health check
        run: |
          sleep 30
          if ! curl -f https://api.${{ secrets.DOMAIN }}/health; then
            echo "::error::Health check failed after rollback!"
            exit 1
          fi
          echo "Health check passed"

      - name: Record rollback
        run: |
          echo "Rollback completed successfully"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "From: ${{ needs.prepare.outputs.current_sha }}"
          echo "To: ${{ needs.prepare.outputs.target_sha }}"
          echo "Database rollback: ${{ github.event.inputs.include_database }}"

  # Notify on completion
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [prepare, rollback]
    if: always()
    steps:
      - name: Notify success
        if: needs.rollback.result == 'success'
        run: |
          echo "✅ Rollback to ${{ needs.prepare.outputs.target_sha }} completed successfully"
          # Add Slack/Discord notification here

      - name: Notify failure
        if: needs.rollback.result == 'failure'
        run: |
          echo "❌ Rollback to ${{ needs.prepare.outputs.target_sha }} failed"
          # Add Slack/Discord notification here
