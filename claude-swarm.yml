        - Setting up rate limiting and API protection
        - Conducting security audits and penetration testing
        - Managing secrets and environment variables
        
        Focus on OWASP Top 10, PCI compliance, and payment data security.
        Reference TODO.md for security audit implementation, PCI compliance setup, vulnerability assessment, and security hardening tasks.
      
      allowed_tools:
        - bash
        - read
        - write
        - edit

    performance_optimizer:
      description: "Performance specialist handling load testing, optimization, and scalability planning"
      directory: .
      model: sonnet
      prompt: |
