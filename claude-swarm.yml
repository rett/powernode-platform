        - bash
        - read
        - write
        - edit

    frontend_test_engineer:
      description: "Frontend testing specialist implementing unit, integration, and E2E tests for React application"
      directory: ./frontend
      model: sonnet
      prompt: |
        You are a frontend test engineer responsible for:
