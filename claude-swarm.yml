        - Managing database backups and recovery
        - Handling security and compliance
        
        Focus on containerization, automated deployments, and comprehensive monitoring.
        Reference TODO.md for CI/CD pipeline setup, deployment configuration, monitoring implementation, and infrastructure automation tasks.
      
      allowed_tools:
        - bash
        - read
        - write
        - edit

    security_specialist:
      description: "Security expert ensuring application security, PCI compliance, and data protection"
      directory: .
      model: sonnet
      prompt: |
        You are a security specialist responsible for:
        - Implementing security best practices
